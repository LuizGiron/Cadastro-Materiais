<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Resetar Senha</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Redefinição de Senha</h1>

    <form id="formReset">
      <input type="password" id="novaSenha" placeholder="Nova senha" required minlength="6" />
      <input type="password" id="confirmarSenha" placeholder="Confirme a senha" required minlength="6" />
      <button type="submit" class="btn">Atualizar senha</button>
    </form>
  </div>

  <script>
    document.getElementById('formReset').addEventListener('submit', async function (e) {
      e.preventDefault();
      const novaSenha = document.getElementById('novaSenha').value;
      const confirmarSenha = document.getElementById('confirmarSenha').value;

      if (novaSenha !== confirmarSenha) {
        alert('❌ As senhas não coincidem.');
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');

      if (!token) {
        alert('❌ Token inválido.');
        return;
      }

      try {
        const btn = this.querySelector('button');
        btn.disabled = true;
        btn.textContent = 'Atualizando...';
        
        const response = await fetch('http://localhost:5008/Usuario/resetar-senha', {
          method: 'POST',
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, novaSenha })
        });

        const result = await response.text();

        if (response.ok) {
          alert('✅ ' + result);
          window.location.href = 'login.html';
        } else {
          alert('❌ ' + result);
        }

      } catch (error) {
        alert('❌ Erro: ' + error.message);
      } finally {
        const btn = document.querySelector('button');
        btn.disabled = false;
        btn.textContent = 'Atualizar senha';
      }
    });
  </script>
</body>
</html>
