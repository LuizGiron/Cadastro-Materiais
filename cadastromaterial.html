<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Materiais</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="index.html">Cadastrar Usuário</a>
    <a href="login.html">Login</a>
    <a href="#" id="linkLogout" style="display:none;">Sair</a>
  </nav>
    <div class="container">
        <h1>Cadastro de Materiais</h1>

        <div id="form-container">
            <input type="text" id="nome" placeholder="Nome do Material" required />
            <input type="text" id="descricao" placeholder="Descrição" required />
            <input type="number" id="quantidade" placeholder="Quantidade" required />
            <button onclick="cadastrarMaterial()" class="btn">Cadastrar Material</button>
        </div>
        <div id="notification" class="notification hidden"></div>
        <div id="confirm-box" class="confirm-box hidden">
            <p id="confirm-message">Tem certeza que deseja excluir este material?</p>
            <button onclick="confirmAction()">Sim</button>
            <button onclick="cancelAction()">Não</button>
        </div>

        <button class="btn"><a href="listamateriais.html" class="link">Ver Materiais Cadastrados</a></button>
    </div>

    <script src="script.js"></script>
</body>

</html>
